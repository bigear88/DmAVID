<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>實驗流程</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Noto Sans TC', 'Roboto', sans-serif; background-color: #1E293B; color: #F8FAFC; }
        .slide-container {
            width: 1280px;
            min-height: 720px; /* keep as required */
            background: #1E293B;
            position: relative;
            overflow: hidden;
            padding: 60px 80px; /* keep top padding for title consistency */
            display: flex;
            flex-direction: column;
        }
        .header {
            margin-bottom: 50px;
            border-bottom: 2px solid #334155;
            padding-bottom: 20px;
        }
        .title {
            font-size: 48px;
            font-weight: 700;
            color: #F8FAFC;
            margin-bottom: 10px;
        }
        .process-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(2, 1fr);
            gap: 16px; /* reduced gap to save vertical space */
            flex: 1;
            position: relative;
        }
        .step-card {
            background: #0F172A;
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 18px; /* reduced padding */
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            position: relative;
            z-index: 2;
        }
        .step-number {
            position: absolute;
            top: -15px;
            left: 20px;
            background: #10B981;
            color: #0F172A;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            font-size: 20px;
            font-weight: 700;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .step-icon {
            font-size: 48px;
            color: #2563EB;
            margin-bottom: 12px; /* reduced */
            margin-top: 6px; /* reduced */
        }
        .step-title {
            font-size: 24px;
            font-weight: 700;
            color: #F8FAFC;
            margin-bottom: 6px; /* reduced */
        }
        .step-desc {
            font-size: 18px;
            color: #94A3B8;
            line-height: 1.4;
            white-space: nowrap; /* keep descriptions to single line to save height */
            overflow: hidden;
            text-overflow: ellipsis;
        }
        /* Remove all pseudo arrows to avoid extra vertical offsets */
        .step-card::after { display: none; }
    </style>
</head>
<body>
    <div class="slide-container">
        <div class="header">
            <h1 class="title">實驗流程</h1>
        </div>

        <div class="process-grid">
            <!-- Step 1 -->
            <div class="step-card">
                <div class="step-number">1</div>
                <i class="fas fa-file-code step-icon"></i>
                <div class="step-title">解析 Config</div>
                <div class="step-desc">讀取 config.yaml，取得漏洞 Ground Truth</div>
            </div>
            
            <!-- Step 2 -->
            <div class="step-card">
                <div class="step-number">2</div>
                <i class="fab fa-git-alt step-icon"></i>
                <div class="step-title">克隆 Repo</div>
                <div class="step-desc">解析 Dockerfile，提取 URL 並下載源碼</div>
            </div>
            
            <!-- Step 3 -->
            <div class="step-card">
                <div class="step-number">3</div>
                <i class="fas fa-filter step-icon"></i>
                <div class="step-title">提取 Solidity</div>
                <div class="step-desc">遍歷目錄結構，提取所有 .sol 檔案</div>
            </div>
            
            <!-- Step 4 -->
            <div class="step-card">
                <div class="step-number">4</div>
                <i class="fas fa-robot step-icon"></i>
                <div class="step-title">執行偵測</div>
                <div class="step-desc">LLM+RAG Pipeline，分析合約漏洞</div>
            </div>
            
            <!-- Step 5 -->
            <div class="step-card">
                <div class="step-number">5</div>
                <i class="fas fa-gavel step-icon"></i>
                <div class="step-title">結果評估</div>
                <div class="step-desc">LLM Judge 比對，偵測結果與已知漏洞</div>
            </div>
            
            <!-- Step 6 -->
            <div class="step-card">
                <div class="step-number">6</div>
                <i class="fas fa-chart-pie step-icon"></i>
                <div class="step-title">計算指標</div>
                <div class="step-desc">統計 Detect Score，生成實驗報告</div>
            </div>
        </div>
    </div>
</body>
</html>
