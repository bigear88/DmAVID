<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pre-Agent Era 基線定位</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Noto Sans TC', 'Roboto', sans-serif; background-color: #1E293B; color: #F8FAFC; }
        .slide-container {
            width: 1280px;
            min-height: 720px; /* keep as required */
            background: #1E293B;
            position: relative;
            overflow: hidden;
            padding: 50px 60px; /* must keep top padding of title */
            display: flex;
            flex-direction: column;
        }
        .header {
            margin-bottom: 12px; /* reduced from 20 */
            border-bottom: 2px solid #334155;
            padding-bottom: 8px; /* reduced from 15 */
        }
        .title {
            font-size: 48px;
            font-weight: 700;
            color: #F8FAFC;
            margin-bottom: 10px;
        }
        .chart-section {
            flex: 1.5;
            background: #F8FAFC;
            border-radius: 12px;
            padding: 12px; /* reduced from 20 */
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 20px; /* reduced from 30 */
            border: 1px solid #334155;
        }
        .chart-img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            max-height: 240px; /* reduced from 300px */
        }
        .insights-section {
            flex: 1;
            display: flex;
            gap: 18px; /* reduced from 30 */
        }
        .insight-card {
            flex: 1;
            background: #0F172A;
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 14px; /* reduced from 25 */
            display: flex;
            flex-direction: column;
            position: relative;
        }
        .card-icon {
            font-size: 32px;
            margin-bottom: 10px; /* reduced from 15 */
            color: #10B981;
        }
        .card-title {
            font-size: 22px;
            font-weight: 700;
            color: #F8FAFC;
            margin-bottom: 8px; /* reduced from 10 */
        }
        .card-text {
            font-size: 16px;
            color: #CBD5E1;
            line-height: 1.5;
        }
        .card-1 { border-top: 4px solid #10B981; }
        .card-2 { border-top: 4px solid #2563EB; }
        .card-3 { border-top: 4px solid #F59E0B; }
        
        .card-1 .card-icon { color: #10B981; }
        .card-2 .card-icon { color: #2563EB; }
        .card-3 .card-icon { color: #F59E0B; }
    </style>
</head>
<body>
    <div class="slide-container">
        <div class="header">
            <h1 class="title">Pre-Agent Era 基線定位</h1>
        </div>
        
        <div class="chart-section">
            <img src="/home/ubuntu/evmbench_charts/evmbench_timeline.png" alt="Timeline Chart" class="chart-img">
        </div>
        
        <div class="insights-section">
            <div class="insight-card card-1">
                <i class="fas fa-ruler-combined card-icon"></i>
                <div class="card-title">量化效能上限</div>
                <div class="card-text">
                    7.50% 代表了在不具備動態執行與工具使用能力下，靜態 LLM+RAG 方法在真實複雜審計中的效能天花板。
                </div>
            </div>
            
            <div class="insight-card card-2">
                <i class="fas fa-bridge card-icon"></i>
                <div class="card-title">技術演進橋樑</div>
                <div class="card-text">
                    本研究連接了傳統靜態分析 (Slither) 與未來自主 Agent，明確界定了單純語義理解與完整 Agent 能力之間的邊界。
                </div>
            </div>
            
            <div class="insight-card card-3">
                <i class="fas fa-vial card-icon"></i>
                <div class="card-title">未來評估基準</div>
                <div class="card-text">
                    為未來的 Agent 系統提供必要的「對照組」，確保新技術的效能提升是來自於 Agent 架構的改進，而非模型本身的升級。
                </div>
            </div>
        </div>
    </div>
</body>
</html>
