<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>結論</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Noto Sans TC', 'Roboto', sans-serif; background-color: #1E293B; color: #F8FAFC; }
        .slide-container {
            width: 1280px;
            min-height: 720px;
            background: #1E293B;
            position: relative;
            overflow: hidden;
            padding: 60px 80px 20px; /* keep top 60, reduce bottom to save height */
            display: flex;
            flex-direction: column;
        }
        .header {
            margin-bottom: 30px; /* slightly reduced */
            border-bottom: 2px solid #334155;
            padding-bottom: 20px;
        }
        .title {
            font-size: 48px;
            font-weight: 700;
            color: #F8FAFC;
            margin-bottom: 10px;
        }
        .content-wrapper {
            display: flex;
            flex-direction: column;
            gap: 24px; /* reduced gap */
            flex: 1;
        }
        .hero-box {
            background: rgba(16, 185, 129, 0.1);
            border: 2px solid #10B981;
            border-radius: 16px;
            padding: 24px; /* reduced padding */
            text-align: center;
            position: relative;
        }
        .hero-icon {
            position: absolute;
            top: -24px; /* adjusted to match smaller padding */
            left: 50%;
            transform: translateX(-50%);
            background: #1E293B;
            padding: 0 20px;
            color: #10B981;
            font-size: 40px;
        }
        .hero-text {
            font-size: 32px;
            font-weight: 700;
            color: #F8FAFC;
            line-height: 1.4;
        }
        .points-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px; /* reduced gap */
            flex: 1;
        }
        .point-card {
            background: #0F172A;
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 20px; /* reduced padding */
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }
        .point-icon {
            width: 60px; /* slightly smaller */
            height: 60px;
            background: rgba(37, 99, 235, 0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            color: #2563EB;
            margin-bottom: 16px;
        }
        .point-title {
            font-size: 24px;
            font-weight: 700;
            color: #F8FAFC;
            margin-bottom: 12px;
        }
        .point-desc {
            font-size: 18px;
            color: #94A3B8;
            line-height: 1.5;
        }
        .highlight {
            color: #10B981;
            font-weight: 700;
        }
    </style>
</head>
<body>
    <div class="slide-container">
        <div class="header">
            <h1 class="title">結論</h1>
        </div>
        
        <div class="content-wrapper">
            <div class="hero-box">
                <div class="hero-icon"><i class="fas fa-flag-checkered"></i></div>
                <div class="hero-text">
                    本研究成功建立了 <span style="color: #10B981;">Pre-Agent Era</span> 的效能基線，<br>並證明了從 LLM+RAG 邁向 Autonomous Agent 的必要性。
                </div>
            </div>
            
            <div class="points-grid">
                <div class="point-card">
                    <div class="point-icon"><i class="fas fa-graduation-cap"></i></div>
                    <div class="point-title">學術驗證成功</div>
                    <div class="point-desc">
                        在 SmartBugs 基準測試中取得 <span class="highlight">F1=88.61%</span> 的優異成績，證明了 RAG 架構在處理已知漏洞模式上的有效性。
                    </div>
                </div>
                
                <div class="point-card">
                    <div class="point-icon"><i class="fas fa-search-location"></i></div>
                    <div class="point-title">現實挑戰明確</div>
                    <div class="point-desc">
                        EVMbench 的 <span class="highlight">7.50%</span> 偵測率量化了當前技術與真實世界審計的差距，突顯了對動態執行能力的依賴。
                    </div>
                </div>
                
                <div class="point-card">
                    <div class="point-icon"><i class="fas fa-road"></i></div>
                    <div class="point-title">確立演進方向</div>
                    <div class="point-desc">
                        本研究的數據為未來的 <span class="highlight">Agent 系統</span> 提供了一個不可或缺的比較基準，指引了工具整合與多步推理的發展路徑。
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
